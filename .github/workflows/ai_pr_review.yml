name: AI PR Reviewer

on:
  pull_request:
    branches: [ main ]

jobs:
  build_and_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Gemini SDK
        run: pip install google-generativeai

      - name: Generate AI PR Summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git diff origin/${{ github.base_ref }} HEAD > pr_diff.txt
          cat pr_diff.txt | python scripts/pr_reviewer.py > ai_summary.txt

      - name: Post Comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(cat ai_summary.txt)
          gh pr comment ${{ github.event.pull_request.number }} --body "🤖 **AI Reviewer Summary:** $SUMMARY"